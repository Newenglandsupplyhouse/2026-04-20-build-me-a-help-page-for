name: Shopify Theme Push

on:
  push:
    branches:
      - main
    paths:
      - "sections/**"
      - "templates/**"
      - "snippets/**"
      - "layout/**"
      - "assets/**"
      - "config/**"
      - "locales/**"

jobs:
  push-theme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Validate required secrets
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          test -n "$SHOPIFY_CLI_THEME_TOKEN" || (echo "Missing SHOPIFY_CLI_THEME_TOKEN" && exit 1)
          test -n "$SHOPIFY_THEME_ID" || (echo "Missing SHOPIFY_THEME_ID" && exit 1)
          test -n "$SHOPIFY_STORE" || (echo "Missing SHOPIFY_STORE" && exit 1)

      - name: Push theme files to Shopify
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          shopify theme push \
            --theme "${{ secrets.SHOPIFY_THEME_ID }}" \
            --nodelete \
            --only "sections/*.liquid" \
            --only "sections/*.json" \
            --only "templates/*.json" \
            --only "templates/*.liquid" \
            --only "snippets/*" \
            --only "layout/*" \
            --only "assets/*" \
            --only "config/*" \
            --only "locales/*"
