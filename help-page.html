<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #08080b;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      --help-page-viewport-height: 100dvh;
    }

    iframe {
      display: block;
      width: 100%;
      height: var(--help-page-viewport-height);
      min-height: var(--help-page-viewport-height);
      border: 0;
      background: #08080b;
    }
  </style>
</head>
<body>
  <iframe
    src="/chatbase-help"
    title="Help page"
    loading="lazy"
    allow="clipboard-write; microphone"
  ></iframe>
  <script>
    (() => {
      const updateViewportHeight = () => {
        const viewportHeight = window.visualViewport?.height || window.innerHeight;
        document.body.style.setProperty("--help-page-viewport-height", `${Math.round(viewportHeight)}px`);
      };

      updateViewportHeight();
      window.visualViewport?.addEventListener("resize", updateViewportHeight);
      window.visualViewport?.addEventListener("scroll", updateViewportHeight);
      window.addEventListener("resize", updateViewportHeight);
      window.addEventListener("orientationchange", updateViewportHeight);
    })();
  </script>
</body>
</html>
