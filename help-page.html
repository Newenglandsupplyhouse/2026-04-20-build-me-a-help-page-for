<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopify Help Page</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --border: #dcdcdc;
      --surface: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--page-bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .help-box {
      width: min(92vw, 680px);
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(1.6rem, 2vw, 2.2rem);
      font-weight: 600;
    }

    .chat-shell {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      padding: 14px;
      text-align: left;
    }

    .messages {
      min-height: 80px;
      max-height: 320px;
      overflow-y: auto;
      padding: 8px;
    }

    .message {
      margin: 0 0 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message:last-child {
      margin-bottom: 0;
    }

    .message-user strong,
    .message-assistant strong {
      display: inline-block;
      margin-bottom: 4px;
    }

    .message-assistant {
      color: var(--text);
    }

    .message-user {
      color: var(--muted);
    }

    form {
      margin-top: 12px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      background: #ffffff;
      color: var(--text);
    }

    input:focus {
      border-color: #111111;
    }

    .status {
      margin-top: 10px;
      min-height: 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="help-box">
    <h1>What are you shopping for today?</h1>

    <section class="chat-shell" aria-label="Shopping help">
      <div class="messages" id="messages">
        <p class="message message-assistant"><strong>Assistant</strong><br>Ask about products, sizing, shipping, or recommendations.</p>
      </div>

      <form id="chat-form">
        <input
          id="chat-input"
          type="text"
          aria-label="Shopping search"
          autocomplete="off"
          placeholder="Type here and press Enter"
        >
      </form>
    </section>

    <p class="status" id="status"></p>
  </main>

  <script>
    const API_URL = window.HELP_API_URL || "http://localhost:3000/api/chat";
    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("chat-form");
    const inputEl = document.getElementById("chat-input");
    const statusEl = document.getElementById("status");
    const conversation = [];

    function renderMessage(role, text) {
      const wrapper = document.createElement("p");
      wrapper.className = "message " + (role === "user" ? "message-user" : "message-assistant");

      const title = document.createElement("strong");
      title.textContent = role === "user" ? "You" : "Assistant";

      wrapper.appendChild(title);
      wrapper.appendChild(document.createElement("br"));
      wrapper.appendChild(document.createTextNode(text));

      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage(text) {
      statusEl.textContent = "Thinking...";

      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          conversation
        })
      });

      const payload = await response.json();

      if (!response.ok) {
        throw new Error(payload.error || "Something went wrong.");
      }

      return payload;
    }

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();

      const text = inputEl.value.trim();
      if (!text) {
        return;
      }

      conversation.push({ role: "user", content: text });
      renderMessage("user", text);
      inputEl.value = "";
      inputEl.disabled = true;

      try {
        const payload = await sendMessage(text);
        const answer = payload.reply || "I couldn't find an answer yet.";

        conversation.push({ role: "assistant", content: answer });
        renderMessage("assistant", answer);
        statusEl.textContent = payload.usedTools || "";
      } catch (error) {
        renderMessage("assistant", error.message);
        statusEl.textContent = "The request did not complete.";
      } finally {
        inputEl.disabled = false;
        inputEl.focus();
      }
    });
  </script>
</body>
</html>
